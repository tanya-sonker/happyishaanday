<!DOCTYPE html>
<html lang="en" style="background:#060606">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#060606">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ishaan 🎂">
  <title>Happy Birthday Ishaan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ══ SPLASH SCREEN ══ -->
  <div id="splash">
    <p class="splash-title">CURSED ENERGY</p>
    <p class="splash-title">LOADING<span class="splash-dots"></span></p>
    <div class="splash-bar-wrap">
      <div class="splash-bar-fill" id="splash-bar"></div>
    </div>
    <p class="splash-pct" id="splash-pct">0%</p>
  </div>

  <!-- ══ 1. SUKUNA EYES OPEN ══ -->
  <section class="section" id="s1">
    <img class="pixel-img glow-pulse" src="./assets/sukuna-open.png" alt="Sukuna — eyes open">
  </section>

  <!-- ══ 2. DOMAIN EXPANSION KANJI ══ -->
  <section class="section" id="s2">
    <div class="kanji-row">
      <span class="kanji-char">領</span>
      <span class="kanji-char">域</span>
      <span class="kanji-char">展</span>
      <span class="kanji-char">開</span>
    </div>
    <p class="kanji-sub">DOMAIN&nbsp;EXPANSION</p>
  </section>

  <!-- ══ 3. SUKUNA EYES CLOSED + BURST ══ -->
  <section class="section" id="s3">
    <img class="pixel-img fade-rise glow-pulse" src="./assets/sukuna-closed.png" alt="Sukuna — eyes closed" loading="lazy">
    <div class="burst-ring"></div>
    <div class="burst-ring"></div>
    <div class="burst-ring"></div>
    <div class="burst-ring"></div>
    <div class="burst-ring"></div>
    <div class="burst-ring"></div>
  </section>

  <!-- ══ 5. MALEVOLENT SHRINE ══ -->
  <section class="section" id="s5">
    <div class="shrine-bg"></div>
    <div class="shrine-overlay"></div>
    <div class="shrine-text-wrap">
      <p class="shrine-kanji">伏魔御厨子</p>
      <p class="shrine-title">MALEVOLENT<br>SHRINE</p>
    </div>
  </section>

  <!-- ══ 6+7. CURSED ENERGY + BIRTHDAY REVEAL ══ -->
  <section class="section" id="s7">
    <canvas id="cursed-canvas"></canvas>
    <div class="finger-wrap">
      <img class="pixel-img" src="./assets/sukuna-finger.svg" alt="Sukuna's finger" loading="lazy">
    </div>
    <p class="finger-counter">1 / 20</p>
    <p class="congrats-text">
      CONGRATS<br>
      You've scrolled long enough<br>
      to find <span class="name-gold">Ishaan's</span><br>
      birthday gift!
    </p>
  </section>

  <script src="script.js" defer></script>
</body>
</html>
